      tags:
        - VendorCredit
      summary: VendorCredit-Delete
      operationId: vendorCreditDelete
      description: |-
        Delete a vendorcredit object by Id
        Method : POST

        Sample response body 

        {
          "VendorCredit": {
            "domain": "QBO",
            "status": "Deleted",
            "Id": "185"
          },
          "time": "2016-09-02T03:14:13.909-07:00"
        }
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n    \"Id\": \"185\",\n    \"SyncToken\": \"1\"\n}"'
      security:
        - oauth2Auth: []
      parameters:
        - name: User-Agent
          in: header
          schema:
            type: string
          example: '{{UserAgent}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: operation
          in: query
          schema:
            type: string
          example: delete
        - name: companyid
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /v3/company/{companyid}/vendorcredit/185:
    get:
      tags:
        - VendorCredit
      summary: VendorCredit-ReadById
      operationId: vendorCreditReadById
      description: >-
        Read a vendorcredit object by Id

        Method : GET


        Please change the VendorCredit it from 165 to a valid VendorCredit
        objectId which exists in your QBO account
      security:
        - oauth2Auth: []
      parameters:
        - name: User-Agent
          in: header
          schema:
            type: string
          example: '{{UserAgent}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: minorversion
          in: query
          schema:
            type: string
          example: '{{minorversion}}'
        - name: companyid
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
