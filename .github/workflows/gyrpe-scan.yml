name: Grype POC - Docker Image Scan

on:
  workflow_dispatch:

jobs:
  grype-poc-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          sudo apt-get clean
          echo "=== Disk space after cleanup ==="
          df -h

      - name: Pull ToolJet LTS Docker image
        run: docker pull tooljet/tooljet:ee-lts-latest

      - name: Grype Scan - Table Output (visible in logs)
        uses: anchore/scan-action@v7
        with:
          image: 'tooljet/tooljet:ee-lts-latest'
          fail-build: false
          severity-cutoff: high
          output-format: table
          only-fixed: true

      - name: Grype Scan - JSON Output (for report)
        id: grype-scan
        uses: anchore/scan-action@v7
        with:
          image: 'tooljet/tooljet:ee-lts-latest'
          fail-build: false
          severity-cutoff: high
          output-format: json
          output-file: grype-poc-results.json
          only-fixed: true

      - name: Parse Results
        id: parse-grype
        run: |
          if [ -f grype-poc-results.json ]; then
            critical=$(jq '[.matches[]? | select(.vulnerability.severity=="Critical")] | length' grype-poc-results.json)
            high=$(jq '[.matches[]? | select(.vulnerability.severity=="High")] | length' grype-poc-results.json)
          else
            critical=0
            high=0
          fi
          total=$((critical + high))
          echo "critical=$critical" >> $GITHUB_OUTPUT
          echo "high=$high" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT

      - name: Upload JSON Report as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-poc-report
          path: grype-poc-results.json
          retention-days: 14
          if-no-files-found: warn

      - name: Create POC PR with Report
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "poc: grype docker image scan results - tooljet/tooljet:ee-lts-latest"
          branch: poc/grype-docker-scan-${{ github.run_id }}
          base: lts-3.16
          title: "[POC] 🐳 Grype Docker Image Scan — tooljet/tooljet:ee-lts-latest"
          body: |
            ## 🔍 Grype POC — Docker Image Vulnerability Scan

            **No code changes** — scan results only, for manager review and approval.

            ---

            ### Image Scanned
            `tooljet/tooljet:ee-lts-latest` (base: `debian:12-slim`)

            ### Scan Results (fixable CVEs only)
            | Severity | Count |
            |----------|-------|
            | 🔴 Critical | ${{ steps.parse-grype.outputs.critical }} |
            | 🟠 High     | ${{ steps.parse-grype.outputs.high }} |
            | 📊 Total    | ${{ steps.parse-grype.outputs.total }} |

            > `only-fixed: true` — only CVEs that have a patch availables are shown. No noise.

            ---

            ### What Grype Scans (vs our current npm audit)
            | Layer | npm audit (current) | Grype (proposed) |
            |---|---|---|
            | npm packages in source | ✅ | ✅ |
            | OS packages (debian:12-slim) | ❌ | ✅ |
            | npm packages inside the image | ❌ | ✅ |
            | Python packages (/opt/python-runtime) | ❌ | ✅ |
            | Binaries (nsjail, postgrest, node) | ❌ | ✅ |

            ---

            ### What Production Integration Looks Like
            - Runs every **Monday 5:30 AM UTC** alongside existing npm audit jobs
            - **CRITICAL CVEs** → PR auto-created, `@slancerk` tagged as reviewer
            - **HIGH CVEs only** → Slack alert, no PR
            - **Clean** → Slack green notification
            - Full JSON report saved as artifact for 7 days

            ---

            ### Full Report
            👉 Download the complete JSON report from the [Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            Generated by: Grype POC CI
          reviewers: slancerk