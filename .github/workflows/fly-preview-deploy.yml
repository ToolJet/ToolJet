          elif [[ "$TEAM" == "fly-ee-pre-active-marketplace" ]]; then
            [[ "$P" -gt 0 ]] && BUILD_PLUGINS=true
            [[ "$B" -gt 0 ]] && BUILD_BACKEND=true
          fi
          echo "build_frontend=$BUILD_FRONTEND" >> $GITHUB_OUTPUT
          echo "build_backend=$BUILD_BACKEND" >> $GITHUB_OUTPUT
          echo "build_plugins=$BUILD_PLUGINS" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        if: steps.check.outputs.active == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        if: steps.check.outputs.active == 'true'
        uses: actions/cache@v3
        with:
          path: |
            frontend/node_modules
            server/node_modules
            plugins/node_modules
          key: node-modules-ee-pre-${{ hashFiles('frontend/package-lock.json', 'server/package-lock.json', 'plugins/package-lock.json') }}

      - name: Build frontend
        if: steps.check.outputs.active == 'true' && steps.detect.outputs.build_frontend == 'true'
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          TOOLJET_EDITION: ee
        run: |
          npm --prefix frontend install
          npm --prefix frontend run build --production

      - name: Build server
        if: steps.check.outputs.active == 'true' && steps.detect.outputs.build_backend == 'true'
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          NODE_ENV: production
          TOOLJET_EDITION: ee
        run: |
          npm --prefix server install
          npm install -g @nestjs/cli copyfiles
          npm --prefix server run build

      - name: Build plugins
        if: steps.check.outputs.active == 'true' && steps.detect.outputs.build_plugins == 'true'
        env:
          NODE_ENV: production
          TOOLJET_EDITION: ee
        run: |
          npm --prefix plugins install
          npm --prefix plugins run build

      - name: Setup flyctl
        if: steps.check.outputs.active == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Wake machine if suspended
        if: steps.check.outputs.active == 'true'
        run: |
          STATE=$(flyctl machines list --app "$APP_NAME" --json | jq -r '.[0].state // "unknown"')
          if [[ "$STATE" == "suspended" || "$STATE" == "stopped" ]]; then
            MACHINE_ID=$(flyctl machines list --app "$APP_NAME" --json | jq -r '.[0].id')
            flyctl machines start "$MACHINE_ID" --app "$APP_NAME"
            sleep 15
          fi

      - name: Transfer artifacts
        if: steps.check.outputs.active == 'true'
        run: |
          DIRS=""
          [[ "${{ steps.detect.outputs.build_frontend }}" == "true" ]] && DIRS="$DIRS frontend/build"
          [[ "${{ steps.detect.outputs.build_backend }}" == "true" ]] && DIRS="$DIRS server/dist"
          [[ "${{ steps.detect.outputs.build_plugins }}" == "true" ]] && DIRS="$DIRS plugins/dist"
          if [[ -n "$DIRS" ]]; then
            tar -czf /tmp/artifacts.tar.gz $DIRS
            flyctl sftp put --app "$APP_NAME" /tmp/artifacts.tar.gz /tmp/artifacts.tar.gz
            flyctl ssh console --app "$APP_NAME" -C "tar -xzf /tmp/artifacts.tar.gz -C /app && rm /tmp/artifacts.tar.gz"
          else
            echo "No changed files in team scope — skipping transfer"
          fi

      - name: Restart NestJS
        if: steps.check.outputs.active == 'true' && (steps.detect.outputs.build_backend == 'true' || steps.detect.outputs.build_plugins == 'true')
        run: flyctl ssh console --app "$APP_NAME" -C "supervisorctl restart tooljet"

      - name: Comment status
        if: steps.check.outputs.active == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const team = '${{ steps.check.outputs.team }}'.replace('fly-ee-pre-active-', '');
            const parts = [];
            if ('${{ steps.detect.outputs.build_frontend }}' === 'true') parts.push('frontend');
            if ('${{ steps.detect.outputs.build_backend }}' === 'true') parts.push('server');
            if ('${{ steps.detect.outputs.build_plugins }}' === 'true') parts.push('plugins');
            const built = parts.length ? parts.join(', ') : 'nothing (no changes in team scope)';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `⚡ **Fast update** (${team} team) — rebuilt: ${built}\nPreview: https://${{ env.APP_NAME }}.fly.dev`
            });
