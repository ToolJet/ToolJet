name: Trivy POC - Docker Image Scan

on:
  workflow_dispatch:

jobs:
  trivy-poc-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Pull ToolJet LTS Docker image
        run: docker pull tooljet/tooljet:latest

      - name: Trivy Scan - Table Output (visible in logs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'tooljet/tooljet:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Trivy Scan - JSON Output (for report)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'tooljet/tooljet:latest'
          format: 'json'
          output: 'trivy-poc-results.json'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Parse Results
        id: parse-trivy
        run: |
          critical=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-poc-results.json)
          high=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-poc-results.json)
          total=$((critical + high))
          echo "critical=$critical" >> $GITHUB_OUTPUT
          echo "high=$high" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT

      - name: Upload JSON Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-poc-report
          path: trivy-poc-results.json
          retention-days: 14

      - name: Create POC PR with Report
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "poc: trivy docker image scan results - tooljet/tooljet:latest"
          branch: poc/trivy-docker-scan-${{ github.run_id }}
          base: lts-3.16
          title: "[POC] 🐳 Trivy Docker Image Scan — tooljet/tooljet:latest"
          body: |
            ## 🔍 Trivy POC — Docker Image Vulnerability Scan

            This PR demonstrates what Trivy adds to our existing security pipeline.
            **No code changes** — scan results only, for manager review and approval.

            ---

            ### Image Scanned
            `tooljet/tooljet:latest` (base: `debian:12-slim`)

            ### Scan Results (fixable CVEs only)
            | Severity | Count |
            |----------|-------|
            | 🔴 Critical | ${{ steps.parse-trivy.outputs.critical }} |
            | 🟠 High     | ${{ steps.parse-trivy.outputs.high }} |
            | 📊 Total    | ${{ steps.parse-trivy.outputs.total }} |

            > `ignore-unfixed: true` — only CVEs that have a patch available are shown.

            ---

            ### What Trivy Scans (vs our current npm audit)

            | Layer | npm audit (current) | Trivy (proposed) |
            |---|---|---|
            | npm packages in source | ✅ | ✅ |
            | OS packages (debian:12-slim) | ❌ | ✅ |
            | npm packages inside the image | ❌ | ✅ |
            | Python packages (/opt/python-runtime) | ❌ | ✅ |
            | Binaries (nsjail, postgrest, node) | ❌ | ✅ |

            ---

            ### What Production Integration Looks Like
            - Runs every **Monday 5:30 AM UTC** alongside existing npm audit jobs
            - **CRITICAL CVEs** → PR auto-created, `@slancerk` + `@adish` tagged as reviewers
            - **HIGH CVEs only** → Slack alert, no PR
            - **Clean** → Slack green notification
            - Full JSON report saved as artifact for 7 days

            ---

            ### Full Report
            👉 Download the complete JSON report from the [Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            *(Lists every CVE by package name, installed version, fixed version, and CVE ID)*

            ---

            > Once approved, Trivy job will be merged into `vulnerability-ci.yml` — zero additional cost, fully open-source.

            Generated by: Trivy POC CI
          reviewers: slancerk,adish
          labels: poc,security,docker,trivy