name: CI

on:
  push:
    branches: [lts-3.16]
  pull_request:
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Detect which directories changed — gates all downstream jobs
  # ---------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || (github.event_name == 'pull_request'
          && github.event.action == 'labeled'
          && github.event.label.name == 'run-ci')
    outputs:
      server: ${{ steps.filter.outputs.server }}
      frontend: ${{ steps.filter.outputs.frontend }}
      plugins: ${{ steps.filter.outputs.plugins }}
      marketplace: ${{ steps.filter.outputs.marketplace }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
            frontend:
              - 'frontend/**'
            plugins:
              - 'plugins/**'
            marketplace:
              - 'marketplace/**'

  # ---------------------------------------------------------------------------
  # 2. Build-check jobs — lint + build per folder
  #    Plugins runs first (produces artifact), then server + frontend in parallel
  # ---------------------------------------------------------------------------
  build-plugins:
    name: 'Lint & Build · plugins'
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.server == 'true'
      || needs.detect-changes.outputs.plugins == 'true'
      || needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Checkout EE submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global url."https://x-access-token:${{ secrets.CUSTOM_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'plugins/package-lock.json'
      - run: npm ci --prefix plugins
      - run: npm run --prefix plugins lint
      - run: npm run --prefix plugins build
      - uses: actions/upload-artifact@v4
        with:
          name: plugins-dist
          path: |
            plugins/dist/
            plugins/client.js
            plugins/packages/common/
            plugins/packages/*/dist/
            plugins/package.json
            plugins/node_modules/
          compression-level: 1
          retention-days: 1

  build-server:
    name: 'Lint & Build · server'
    runs-on: ubuntu-latest
    needs: [detect-changes, build-plugins, build-marketplace]
    if: needs.detect-changes.outputs.server == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Checkout EE submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global url."https://x-access-token:${{ secrets.CUSTOM_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
      - uses: actions/download-artifact@v4
        with:
          name: plugins-dist
          path: plugins/
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - run: npm ci --prefix server
      - run: npm run --prefix server lint
      - run: npm run --prefix server build

  build-frontend:
    name: 'Lint & Build · frontend'
    runs-on: ubuntu-latest
    needs: [detect-changes, build-plugins, build-marketplace]
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Checkout EE submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global url."https://x-access-token:${{ secrets.CUSTOM_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
      - uses: actions/download-artifact@v4
        with:
          name: plugins-dist
          path: plugins/
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - run: npm ci --prefix frontend
      - run: npm run --prefix frontend lint
      - run: npm run --prefix frontend build

  build-marketplace:
    name: 'Lint & Build · marketplace'
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.marketplace == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'marketplace/package-lock.json'
      - run: npm ci --prefix marketplace
      # eslint 8's flat-config auto-detect trips over frontend/eslint.config.mjs;
      # force eslintrc mode until marketplace migrates to a flat config of its own
      - run: ESLINT_USE_FLAT_CONFIG=false npm run --prefix marketplace lint
      # `npm run build --workspaces` builds alphabetically; plugins import
      # @tooljet-marketplace/common's dist, so build common first
      - run: npm run --prefix marketplace build --workspace=@tooljet-marketplace/common
      - run: npm run --prefix marketplace build

  # ---------------------------------------------------------------------------
  # 3. Test jobs — need plugins build artifact
  # ---------------------------------------------------------------------------
  test-server-unit:
    name: 'Test Suite · server-unit'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - detect-changes
      - build-plugins
      - build-marketplace
      - build-server
      - build-frontend
    if: needs.detect-changes.outputs.server == 'true'
    container: node:22.15.1-bullseye
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5
    env:
      FORCE_COLOR: true
      NODE_OPTIONS: '--max-old-space-size=4096'
      NODE_ENV: test
      LOCKBOX_MASTER_KEY: lockbox-master-key
      SECRET_KEY_BASE: secret-key-base
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASS: postgres
      PG_DB: tooljet_test
      TOOLJET_DB_USER: postgres
      TOOLJET_DB_PASS: postgres
      TOOLJET_DB_HOST: postgres
      TOOLJET_DB_PORT: 5432
      TOOLJET_DB: tooljet_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4
      - name: Checkout EE submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global url."https://x-access-token:${{ secrets.CUSTOM_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
      - uses: actions/download-artifact@v4
        with:
          name: plugins-dist
          path: plugins/
      - uses: actions/cache@v4
        id: server-nm
        with:
          path: server/node_modules
          key: ${{ runner.os }}-server-nm-${{ hashFiles('server/package-lock.json') }}
      - run: apt-get update && apt-get install -y postgresql-client
      - run: npm ci --prefix server
        if: steps.server-nm.outputs.cache-hit != 'true'
      - run: NODE_ENV= npm run --prefix server db:create
      - run: NODE_ENV= npm run --prefix server db:migrate
      - run: npm run --prefix server test

  test-server-e2e:
    name: 'Test Suite · server-e2e'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - detect-changes
      - build-plugins
      - build-marketplace
      - build-server
      - build-frontend
    if: needs.detect-changes.outputs.server == 'true'
    container: node:22.15.1-bullseye
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5
    env:
      FORCE_COLOR: true
      NODE_OPTIONS: '--max-old-space-size=8192'
      NODE_ENV: test
      LOCKBOX_MASTER_KEY: lockbox-master-key
      SECRET_KEY_BASE: secret-key-base
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASS: postgres
      PG_DB: tooljet_test
      TOOLJET_DB_USER: postgres
      TOOLJET_DB_PASS: postgres
      TOOLJET_DB_HOST: postgres
      TOOLJET_DB_PORT: 5432
      TOOLJET_DB: tooljet_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKFLOW_TIMEOUT_SECONDS: '60'
      PGRST_JWT_SECRET: 'r9iMKoe5CRMgvJBBtp4HrqN7QiPpUToj'
      ENABLE_TOOLJET_DB: 'true'
      ENABLE_EXTERNAL_API: 'true'
      EXTERNAL_API_ACCESS_TOKEN: test-external-api-token
    steps:
      - uses: actions/checkout@v4
      - name: Checkout EE submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global url."https://x-access-token:${{ secrets.CUSTOM_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
      - uses: actions/download-artifact@v4
        with:
          name: plugins-dist
          path: plugins/
      - uses: actions/cache@v4
        id: server-nm
        with:
          path: server/node_modules
          key: ${{ runner.os }}-server-nm-${{ hashFiles('server/package-lock.json') }}
      - run: apt-get update && apt-get install -y postgresql-client python3 python3-pip
      - run: npm ci --prefix server
        if: steps.server-nm.outputs.cache-hit != 'true'
      - run: NODE_ENV= npm run --prefix server db:create
      - run: NODE_ENV= npm run --prefix server db:migrate
      - run: npm run --prefix server test:e2e -- --testTimeout=60000

  # ---------------------------------------------------------------------------
  # 4. Cypress E2E — reusable workflows, run after server tests pass
  # ---------------------------------------------------------------------------
  cypress-platform:
    name: 'Test Suite · cypress-platform'
    needs:
      - detect-changes
      - build-plugins
      - build-marketplace
      - build-server
      - build-frontend
    if: >-
      needs.detect-changes.outputs.server == 'true'
      || needs.detect-changes.outputs.frontend == 'true'
    uses: ./.github/workflows/cypress-platform.yml
    with:
      edition: 'ee'
    secrets: inherit

  cypress-marketplace:
    name: 'Test Suite · cypress-marketplace'
    needs:
      - detect-changes
      - build-plugins
      - build-server
      - build-frontend
      - build-marketplace
    if: needs.detect-changes.outputs.marketplace == 'true'
    uses: ./.github/workflows/cypress-marketplace.yml
    with:
      edition: 'ee'
    secrets: inherit

  # ---------------------------------------------------------------------------
  # 5. Gate — aggregates results, posts PR comment, removes label
  # ---------------------------------------------------------------------------
  ci-gate:
    name: 'Gate'
    runs-on: ubuntu-latest
    if: always()
    needs:
      - detect-changes
      - build-server
      - build-frontend
      - build-plugins
      - build-marketplace
      - test-server-unit
      - test-server-e2e
      - cypress-platform
      - cypress-marketplace
    steps:
      - name: Evaluate results
        id: eval
        run: |
          if [[ "${{ needs.detect-changes.result }}" == "skipped" ]]; then
            echo "CI was not triggered (no run-ci label). Gate passes."
            echo "verdict=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ needs.detect-changes.result }}" == "failure" ]]; then
            echo "::error::detect-changes failed — CI infrastructure broken"
            echo "verdict=fail" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          failed=false
          results=(
            "build-server:${{ needs.build-server.result }}"
            "build-frontend:${{ needs.build-frontend.result }}"
            "build-plugins:${{ needs.build-plugins.result }}"
            "build-marketplace:${{ needs.build-marketplace.result }}"
            "test-server-unit:${{ needs.test-server-unit.result }}"
            "test-server-e2e:${{ needs.test-server-e2e.result }}"
            "cypress-platform:${{ needs.cypress-platform.result }}"
            "cypress-marketplace:${{ needs.cypress-marketplace.result }}"
          )

          for entry in "${results[@]}"; do
            job="${entry%%:*}"
            result="${entry##*:}"
            echo "$job: $result"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              failed=true
            fi
          done

          if [[ "$failed" == "true" ]]; then
            echo "verdict=fail" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=pass" >> "$GITHUB_OUTPUT"
          fi

      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.eval.outputs.verdict != 'skip'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number || context.issue?.number;
            if (!prNumber) {
              core.warning('Could not determine PR number — skipping comment');
              return;
            }

            const sha = (context.payload.pull_request?.head?.sha || context.sha || '').slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const icon = (r) => {
              if (r === 'success')   return ':white_check_mark:';
              if (r === 'skipped')   return ':next_track_button:';
              if (r === 'failure')   return ':x:';
              if (r === 'cancelled') return ':no_entry_sign:';
              return ':grey_question:';
            };

            // Lint & Build row — combine all build-* results inline
            const checks = [
              { name: 'server',      result: '${{ needs.build-server.result }}' },
              { name: 'plugins',     result: '${{ needs.build-plugins.result }}' },
              { name: 'frontend',    result: '${{ needs.build-frontend.result }}' },
              { name: 'marketplace', result: '${{ needs.build-marketplace.result }}' },
            ];
            const checkStatus = checks.map(c => `${icon(c.result)} ${c.name}`).join(' · ');

            // Test rows
            const unitResult = '${{ needs.test-server-unit.result }}';
            const e2eResult = '${{ needs.test-server-e2e.result }}';

            // Cypress rows
            const cypressPlatformResult = '${{ needs.cypress-platform.result }}';
            const cypressMarketplaceResult = '${{ needs.cypress-marketplace.result }}';

            const verdict = '${{ steps.eval.outputs.verdict }}';
            const verdictLine = verdict === 'pass'
              ? ':white_check_mark: **All checks passed**'
              : ':x: **Failed** — fix issues and re-add `run-ci` label';

            const body = [
              `### CI — [\`${sha}\`](${runUrl})`,
              '',
              '| Step | Status |',
              '|------|--------|',
              `| **Lint & Build** | ${checkStatus} |`,
              `| **Unit Tests** | ${icon(unitResult)} ${unitResult} |`,
              `| **E2E Tests** | ${icon(e2eResult)} ${e2eResult} |`,
              `| **Cypress — Platform** | ${icon(cypressPlatformResult)} ${cypressPlatformResult} |`,
              `| **Cypress — Marketplace** | ${icon(cypressMarketplaceResult)} ${cypressMarketplaceResult} |`,
              '',
              verdictLine,
            ].join('\n');

            const marker = '<!-- ci-gate-comment -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(marker));

            const fullBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: fullBody,
              });
            }

      - name: Remove run-ci label
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number || context.issue?.number;
            if (!prNumber) return;
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: 'run-ci',
              });
            } catch (e) {
              if (e.status !== 404) throw e;
            }

      - name: Fail gate if checks failed
        if: steps.eval.outputs.verdict == 'fail'
        run: |
          echo "::error::One or more CI jobs failed"
          exit 1
