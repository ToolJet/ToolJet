name: CI

on:
  push:
    branches: [lts-3.16]
  pull_request:
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Detect which directories changed — gates all downstream jobs
  # ---------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || (github.event_name == 'pull_request'
          && github.event.action == 'labeled'
          && github.event.label.name == 'run-ci')
    outputs:
      server: ${{ steps.filter.outputs.server }}
      frontend: ${{ steps.filter.outputs.frontend }}
      plugins: ${{ steps.filter.outputs.plugins }}
      marketplace: ${{ steps.filter.outputs.marketplace }}
    steps:
      - uses: actions/checkout@v4
      # On push events, paths-filter compares HEAD~1 (not PR base).
      # On pull_request events, it compares against the PR base branch.
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
            frontend:
              - 'frontend/**'
            plugins:
              - 'plugins/**'
            marketplace:
              - 'marketplace/**'

  # ---------------------------------------------------------------------------
  # 2. Lint jobs — parallel, no build dependency
  # ---------------------------------------------------------------------------
  lint-server:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - run: npm ci --prefix server
      - run: npm run --prefix server lint

  lint-frontend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            plugins/package-lock.json
      - run: npm ci --prefix plugins
      - run: npm ci --prefix frontend
      - run: npm run --prefix frontend lint

  lint-plugins:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.plugins == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'plugins/package-lock.json'
      - run: npm ci --prefix plugins
      - run: npm run --prefix plugins lint

  lint-marketplace:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.marketplace == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'marketplace/package-lock.json'
      - run: npm ci --prefix marketplace
      - run: npm run --prefix marketplace lint

  # ---------------------------------------------------------------------------
  # 3. Build plugins — when server/ or plugins/ changed (needed for migrations)
  # ---------------------------------------------------------------------------
  build-plugins:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.server == 'true'
      || needs.detect-changes.outputs.plugins == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'plugins/package-lock.json'
      - run: npm ci --prefix plugins
      - run: npm run --prefix plugins build
      - uses: actions/upload-artifact@v4
        with:
          name: plugins-dist
          path: |
            plugins/dist/
            plugins/client.js
            plugins/packages/common/
            plugins/packages/*/dist/
            plugins/package.json
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 4. Test jobs
  # ---------------------------------------------------------------------------
  test-server-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [detect-changes, build-plugins]
    if: needs.detect-changes.outputs.server == 'true'
    # Keep container image version in sync with .nvmrc
    container: node:22.15.1-bullseye
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      FORCE_COLOR: true
      NODE_OPTIONS: '--max-old-space-size=4096'
      NODE_ENV: test
      LOCKBOX_MASTER_KEY: lockbox-master-key
      SECRET_KEY_BASE: secret-key-base
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASS: postgres
      PG_DB: tooljet_test
      TOOLJET_DB_USER: postgres
      TOOLJET_DB_PASS: postgres
      TOOLJET_DB_HOST: postgres
      TOOLJET_DB_PORT: 5432
      TOOLJET_DB: tooljet_db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-server-plugins-${{ hashFiles('server/package-lock.json', 'plugins/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-server-plugins-
      - uses: actions/download-artifact@v4
        with:
          name: plugins-dist
          path: plugins/
      - run: apt-get update && apt-get install -y postgresql-client
      - run: npm ci --prefix plugins
      - run: npm ci --prefix server
      # db:create and db:migrate need NODE_ENV unset — ormconfig disables
      # schema migrations when NODE_ENV=test. Tests set NODE_ENV themselves.
      - run: NODE_ENV= npm run --prefix server db:create
      - run: NODE_ENV= npm run --prefix server db:migrate
      - run: npm run --prefix server test

  test-server-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [detect-changes, build-plugins]
    if: needs.detect-changes.outputs.server == 'true'
    # Keep container image version in sync with .nvmrc
    container: node:22.15.1-bullseye
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      FORCE_COLOR: true
      NODE_OPTIONS: '--max-old-space-size=8192'
      NODE_ENV: test
      LOCKBOX_MASTER_KEY: lockbox-master-key
      SECRET_KEY_BASE: secret-key-base
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASS: postgres
      PG_DB: tooljet_test
      TOOLJET_DB_USER: postgres
      TOOLJET_DB_PASS: postgres
      TOOLJET_DB_HOST: postgres
      TOOLJET_DB_PORT: 5432
      TOOLJET_DB: tooljet_db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-server-plugins-${{ hashFiles('server/package-lock.json', 'plugins/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-server-plugins-
      - uses: actions/download-artifact@v4
        with:
          name: plugins-dist
          path: plugins/
      - run: apt-get update && apt-get install -y postgresql-client
      - run: npm ci --prefix plugins
      - run: npm ci --prefix server
      # db:create and db:migrate need NODE_ENV unset — ormconfig disables
      # schema migrations when NODE_ENV=test. Tests set NODE_ENV themselves.
      - run: NODE_ENV= npm run --prefix server db:create
      - run: NODE_ENV= npm run --prefix server db:migrate
      - run: npm run --prefix server test:e2e -- --ci --testTimeout=20000

  test-frontend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            plugins/package-lock.json
      - run: npm ci --prefix plugins
      - run: npm ci --prefix frontend
      - run: npm run --prefix frontend test -- --ci --passWithNoTests

  # ---------------------------------------------------------------------------
  # 5. Gate — single required status check, removes label, posts PR comment
  # ---------------------------------------------------------------------------
  ci-gate:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - detect-changes
      - lint-server
      - lint-frontend
      - lint-plugins
      - lint-marketplace
      - build-plugins
      - test-server-unit
      - test-server-e2e
      - test-frontend
    steps:
      - name: Evaluate results
        id: eval
        run: |
          # If detect-changes was skipped (no run-ci label on PR), gate passes
          if [[ "${{ needs.detect-changes.result }}" == "skipped" ]]; then
            echo "CI was not triggered (no run-ci label). Gate passes."
            echo "verdict=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # If detect-changes itself failed, gate must fail
          if [[ "${{ needs.detect-changes.result }}" == "failure" ]]; then
            echo "::error::detect-changes failed — CI infrastructure broken"
            echo "verdict=fail" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          failed=false
          results=(
            "lint-server:${{ needs.lint-server.result }}"
            "lint-frontend:${{ needs.lint-frontend.result }}"
            "lint-plugins:${{ needs.lint-plugins.result }}"
            "lint-marketplace:${{ needs.lint-marketplace.result }}"
            "build-plugins:${{ needs.build-plugins.result }}"
            "test-server-unit:${{ needs.test-server-unit.result }}"
            "test-server-e2e:${{ needs.test-server-e2e.result }}"
            "test-frontend:${{ needs.test-frontend.result }}"
          )

          for entry in "${results[@]}"; do
            job="${entry%%:*}"
            result="${entry##*:}"
            echo "$job: $result"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              failed=true
            fi
          done

          if [[ "$failed" == "true" ]]; then
            echo "verdict=fail" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=pass" >> "$GITHUB_OUTPUT"
          fi

      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.eval.outputs.verdict != 'skip'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const jobs = [
              { name: 'lint-server',       result: '${{ needs.lint-server.result }}' },
              { name: 'lint-frontend',     result: '${{ needs.lint-frontend.result }}' },
              { name: 'lint-plugins',      result: '${{ needs.lint-plugins.result }}' },
              { name: 'lint-marketplace',  result: '${{ needs.lint-marketplace.result }}' },
              { name: 'build-plugins',     result: '${{ needs.build-plugins.result }}' },
              { name: 'test-server-unit',  result: '${{ needs.test-server-unit.result }}' },
              { name: 'test-server-e2e',   result: '${{ needs.test-server-e2e.result }}' },
              { name: 'test-frontend',     result: '${{ needs.test-frontend.result }}' },
            ];

            const icon = (r) => {
              if (r === 'success')   return ':white_check_mark:';
              if (r === 'skipped')   return ':next_track_button:';
              if (r === 'failure')   return ':x:';
              if (r === 'cancelled') return ':no_entry_sign:';
              return ':grey_question:';
            };

            const rows = jobs.map(j => `| ${j.name} | ${icon(j.result)} ${j.result} |`).join('\n');
            const verdict = '${{ steps.eval.outputs.verdict }}';
            const verdictLine = verdict === 'pass'
              ? ':white_check_mark: **All checks passed**'
              : ':x: **Failed** — fix issues and re-add `run-ci` label';

            const body = [
              `## CI Results — \`${sha}\``,
              '',
              '| Job | Status |',
              '|-----|--------|',
              rows,
              '',
              verdictLine,
            ].join('\n');

            // Upsert: find existing CI comment and update it, or create new
            const marker = '<!-- ci-gate-comment -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            const fullBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

      - name: Remove run-ci label
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'run-ci',
              });
            } catch (e) {
              // Label may already be removed — ignore 404
              if (e.status !== 404) throw e;
            }

      - name: Fail gate if checks failed
        if: steps.eval.outputs.verdict == 'fail'
        run: |
          echo "::error::One or more CI jobs failed"
          exit 1
