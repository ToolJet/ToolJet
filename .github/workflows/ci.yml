name: CI

on:
  push:
    branches: [develop, main, 'release/**']
  pull_request:
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  # cancel superseded PR runs (last label wins); never kill a push-validation run
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Detect which directories changed — gates all downstream jobs
  # ---------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || (github.event_name == 'pull_request'
          && github.event.action == 'labeled'
          && contains(fromJSON('["run-ci", "run-ci-changed"]'), github.event.label.name))
    outputs:
      server: ${{ steps.filter.outputs.server }}
      frontend: ${{ steps.filter.outputs.frontend }}
      plugins: ${{ steps.filter.outputs.plugins }}
      marketplace: ${{ steps.filter.outputs.marketplace }}
      # changed = fast lane (run-ci-changed label): lint+build always, changed tests only,
      # no CI Gate commit status. full = merge truth (run-ci label / push / dispatch).
      mode: ${{ (github.event_name == 'pull_request' && github.event.label.name == 'run-ci-changed') && 'changed' || 'full' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
            frontend:
              - 'frontend/**'
            plugins:
              - 'plugins/**'
            marketplace:
              - 'marketplace/**'

  # ---------------------------------------------------------------------------
  # 2. Build-check jobs — lint + build per folder
  #    Plugins runs first (produces artifact), then server + frontend in parallel
  # ---------------------------------------------------------------------------
  build-plugins:
    name: 'Lint & Build · plugins'
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.server == 'true'
      || needs.detect-changes.outputs.plugins == 'true'
      || needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Checkout EE submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global url."https://x-access-token:${{ secrets.CUSTOM_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'plugins/package-lock.json'
      - run: npm ci --prefix plugins
      - run: set -o pipefail; mkdir -p /tmp/buildlog; npm run --prefix plugins lint 2>&1 | tee -a /tmp/buildlog/plugins.log
      - run: set -o pipefail; npm run --prefix plugins build 2>&1 | tee -a /tmp/buildlog/plugins.log
      - name: Upload lint/build log for the PR comment
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildlog-plugins
          path: /tmp/buildlog/
          retention-days: 1
      - uses: actions/upload-artifact@v4
        with:
          name: plugins-dist
          path: |
            plugins/dist/
            plugins/client.js
            plugins/packages/common/
            plugins/packages/*/dist/
            plugins/package.json
            plugins/node_modules/
          compression-level: 1
          retention-days: 1

  build-server:
    name: 'Lint & Build · server'
    runs-on: ubuntu-latest
    needs: [detect-changes, build-plugins, build-marketplace]
    if: needs.detect-changes.outputs.server == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Checkout EE submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global url."https://x-access-token:${{ secrets.CUSTOM_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
      - uses: actions/download-artifact@v4
        with:
          name: plugins-dist
          path: plugins/
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - run: npm ci --prefix server
      # 147 pre-existing manual-fix lint errors on main (unused-vars, require-imports,
      # useless-escape…) — needs its own rehab PR; non-blocking for pipeline validation
      - run: set -o pipefail; mkdir -p /tmp/buildlog; npm run --prefix server lint 2>&1 | tee -a /tmp/buildlog/server.log
        continue-on-error: true
      - run: set -o pipefail; npm run --prefix server build 2>&1 | tee -a /tmp/buildlog/server.log
      - name: Upload lint/build log for the PR comment
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildlog-server
          path: /tmp/buildlog/
          retention-days: 1

  build-frontend:
    name: 'Lint & Build · frontend'
    runs-on: ubuntu-latest
    needs: [detect-changes, build-plugins, build-marketplace]
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Checkout EE submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global url."https://x-access-token:${{ secrets.CUSTOM_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
      - uses: actions/download-artifact@v4
        with:
          name: plugins-dist
          path: plugins/
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - run: npm ci --prefix frontend
      # frontend/ee newly added to the lint glob — advisory until its rehab
      # issue lands (mirrors the server lint debt), then drop continue-on-error
      - run: set -o pipefail; mkdir -p /tmp/buildlog; npm run --prefix frontend lint 2>&1 | tee -a /tmp/buildlog/frontend.log
        continue-on-error: true
      - run: set -o pipefail; npm run --prefix frontend build 2>&1 | tee -a /tmp/buildlog/frontend.log
      - name: Upload lint/build log for the PR comment
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildlog-frontend
          path: /tmp/buildlog/
          retention-days: 1

  build-marketplace:
    name: 'Lint & Build · marketplace'
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.marketplace == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'marketplace/package-lock.json'
      - run: npm ci --prefix marketplace
      # eslint 8's flat-config auto-detect trips over frontend/eslint.config.mjs;
      # force eslintrc mode until marketplace migrates to a flat config of its own
      - run: set -o pipefail; mkdir -p /tmp/buildlog; ESLINT_USE_FLAT_CONFIG=false npm run --prefix marketplace lint 2>&1 | tee -a /tmp/buildlog/marketplace.log
      # `npm run build --workspaces` builds alphabetically; plugins import
      # @tooljet-marketplace/common's dist, so build common first
      - run: set -o pipefail; npm run --prefix marketplace build --workspace=@tooljet-marketplace/common 2>&1 | tee -a /tmp/buildlog/marketplace.log
      - run: set -o pipefail; npm run --prefix marketplace build 2>&1 | tee -a /tmp/buildlog/marketplace.log
      - name: Upload lint/build log for the PR comment
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildlog-marketplace
          path: /tmp/buildlog/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 3. Test jobs — need plugins build artifact
  # ---------------------------------------------------------------------------
  test-server-unit:
    name: 'Test Suite · server-unit'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - detect-changes
      - build-plugins
      - build-marketplace
      - build-server
      - build-frontend
    # explicit result guards: a path-skipped build need must not auto-skip this
    # job (GitHub's implicit success() on needs), only a FAILED build should
    if: >-
      !cancelled()
      && needs.detect-changes.outputs.mode == 'full'
      && needs.detect-changes.outputs.server == 'true'
      && needs.build-plugins.result == 'success'
      && needs.build-server.result == 'success'
      && contains(fromJSON('["success","skipped"]'), needs.build-marketplace.result)
      && contains(fromJSON('["success","skipped"]'), needs.build-frontend.result)
    container: node:22.15.1-bullseye
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5
    env:
      FORCE_COLOR: true
      NODE_OPTIONS: '--max-old-space-size=4096'
      NODE_ENV: test
      LOCKBOX_MASTER_KEY: lockbox-master-key
      SECRET_KEY_BASE: secret-key-base
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASS: postgres
      PG_DB: tooljet_test
      TOOLJET_DB_USER: postgres
      TOOLJET_DB_PASS: postgres
      TOOLJET_DB_HOST: postgres
      TOOLJET_DB_PORT: 5432
      TOOLJET_DB: tooljet_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4
      - name: Checkout EE submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global url."https://x-access-token:${{ secrets.CUSTOM_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
      - uses: actions/download-artifact@v4
        with:
          name: plugins-dist
          path: plugins/
      - uses: actions/cache@v4
        id: server-nm
        with:
          path: server/node_modules
          key: ${{ runner.os }}-server-nm-${{ hashFiles('server/package-lock.json') }}
      - run: apt-get update && apt-get install -y postgresql-client
      - run: npm ci --prefix server
        if: steps.server-nm.outputs.cache-hit != 'true'
      - run: NODE_ENV= npm run --prefix server db:create
      - run: NODE_ENV= npm run --prefix server db:migrate
      - run: npm run --prefix server test -- --json --outputFile /tmp/tj-unit-results.json
      - name: Upload unit results for the PR comment
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: full-unit-results
          path: /tmp/tj-unit-results.json
          if-no-files-found: ignore
          retention-days: 1

  test-server-e2e:
    name: 'Test Suite · server-e2e'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - detect-changes
      - build-plugins
      - build-marketplace
      - build-server
      - build-frontend
    # explicit result guards: a path-skipped build need must not auto-skip this
    # job (GitHub's implicit success() on needs), only a FAILED build should
    if: >-
      !cancelled()
      && needs.detect-changes.outputs.mode == 'full'
      && needs.detect-changes.outputs.server == 'true'
      && needs.build-plugins.result == 'success'
      && needs.build-server.result == 'success'
      && contains(fromJSON('["success","skipped"]'), needs.build-marketplace.result)
      && contains(fromJSON('["success","skipped"]'), needs.build-frontend.result)
    container: node:22.15.1-bullseye
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5
    env:
      FORCE_COLOR: true
      NODE_OPTIONS: '--max-old-space-size=8192'
      NODE_ENV: test
      LOCKBOX_MASTER_KEY: lockbox-master-key
      SECRET_KEY_BASE: secret-key-base
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASS: postgres
      PG_DB: tooljet_test
      TOOLJET_DB_USER: postgres
      TOOLJET_DB_PASS: postgres
      TOOLJET_DB_HOST: postgres
      TOOLJET_DB_PORT: 5432
      TOOLJET_DB: tooljet_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKFLOW_TIMEOUT_SECONDS: '60'
      PGRST_JWT_SECRET: 'r9iMKoe5CRMgvJBBtp4HrqN7QiPpUToj'
      ENABLE_TOOLJET_DB: 'true'
      ENABLE_EXTERNAL_API: 'true'
      EXTERNAL_API_ACCESS_TOKEN: test-external-api-token
    steps:
      - uses: actions/checkout@v4
      - name: Checkout EE submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global url."https://x-access-token:${{ secrets.CUSTOM_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
      - uses: actions/download-artifact@v4
        with:
          name: plugins-dist
          path: plugins/
      - uses: actions/cache@v4
        id: server-nm
        with:
          path: server/node_modules
          key: ${{ runner.os }}-server-nm-${{ hashFiles('server/package-lock.json') }}
      - run: apt-get update && apt-get install -y postgresql-client python3 python3-pip
      - run: npm ci --prefix server
        if: steps.server-nm.outputs.cache-hit != 'true'
      - run: NODE_ENV= npm run --prefix server db:create
      - run: NODE_ENV= npm run --prefix server db:migrate
      - run: mkdir -p /tmp/tj-e2e-json && npm run --prefix server test:e2e -- --testTimeout=60000 --json-output-dir /tmp/tj-e2e-json
      - name: Upload e2e results for the PR comment
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: full-e2e-results
          path: /tmp/tj-e2e-json/
          if-no-files-found: ignore
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 3b. Fast lane (run-ci-changed) — only the jest modules the PR touches.
  #     Lint & Build still run above; this job never feeds the CI Gate status.
  # ---------------------------------------------------------------------------
  test-changed:
    name: 'Changed OK'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - detect-changes
      - build-plugins
      - build-marketplace
      - build-server
      - build-frontend
    if: >-
      !cancelled()
      && needs.detect-changes.outputs.mode == 'changed'
      && needs.detect-changes.outputs.server == 'true'
      && needs.build-plugins.result == 'success'
      && needs.build-server.result == 'success'
      && contains(fromJSON('["success","skipped"]'), needs.build-marketplace.result)
      && contains(fromJSON('["success","skipped"]'), needs.build-frontend.result)
    container: node:22.15.1-bullseye
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5
    env:
      FORCE_COLOR: true
      # env parity with test-server-e2e — this job runs the same e2e specs
      NODE_OPTIONS: '--max-old-space-size=8192'
      NODE_ENV: test
      LOCKBOX_MASTER_KEY: lockbox-master-key
      SECRET_KEY_BASE: secret-key-base
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASS: postgres
      PG_DB: tooljet_test
      TOOLJET_DB_USER: postgres
      TOOLJET_DB_PASS: postgres
      TOOLJET_DB_HOST: postgres
      TOOLJET_DB_PORT: 5432
      TOOLJET_DB: tooljet_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKFLOW_TIMEOUT_SECONDS: '60'
      PGRST_JWT_SECRET: 'r9iMKoe5CRMgvJBBtp4HrqN7QiPpUToj'
      ENABLE_TOOLJET_DB: 'true'
      ENABLE_EXTERNAL_API: 'true'
      EXTERNAL_API_ACCESS_TOKEN: test-external-api-token
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout EE submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global url."https://x-access-token:${{ secrets.CUSTOM_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
      - name: Fetch base branch for merge-base
        run: git fetch origin ${{ github.base_ref }}
      - uses: actions/download-artifact@v4
        with:
          name: plugins-dist
          path: plugins/
      - uses: actions/cache@v4
        id: server-nm
        with:
          path: server/node_modules
          key: ${{ runner.os }}-server-nm-${{ hashFiles('server/package-lock.json') }}
      - run: apt-get update && apt-get install -y postgresql-client python3 python3-pip
      - run: npm ci --prefix server
        if: steps.server-nm.outputs.cache-hit != 'true'
      - run: NODE_ENV= npm run --prefix server db:create
      - run: NODE_ENV= npm run --prefix server db:migrate
      - name: Run changed tests (unit + e2e)
        run: |
          mkdir -p /tmp/tj-e2e-json
          BASE_BRANCH="${{ github.base_ref }}" bash scripts/test-changed.sh 2>&1 | tee /tmp/tj-run.log
          exit "${PIPESTATUS[0]}"
      - name: Capture scope for the PR comment
        if: always()
        run: |
          scope=$(grep -m1 -E 'Changed modules:|Running all server tests|No server files changed' /tmp/tj-run.log || true)
          case "$scope" in
            "Changed modules:"*) mods=$(echo "${scope#Changed modules: }" | sed 's/[^ ]*/`&`/g; s/ /, /g')
                                 echo "modules ${mods}" > /tmp/tj-scope.txt;;
            "Running all"*)      echo "all modules (cross-cutting change)" > /tmp/tj-scope.txt;;
            "No server files"*)  echo "no server changes — lint & build only" > /tmp/tj-scope.txt;;
            *)                   echo "not recorded" > /tmp/tj-scope.txt;;
          esac
      - name: Upload fast-run results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-test-results
          path: |
            /tmp/tj-unit-results.json
            /tmp/tj-e2e-json/
            /tmp/tj-scope.txt
          if-no-files-found: ignore
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 4. Cypress E2E — reusable workflows, run after server tests pass
  # ---------------------------------------------------------------------------
  cypress-platform:
    name: 'Test Suite · cypress-platform'
    needs:
      - detect-changes
      - build-plugins
      - build-marketplace
      - build-server
      - build-frontend
    if: >-
      !cancelled()
      && needs.detect-changes.outputs.mode == 'full'
      && (needs.detect-changes.outputs.server == 'true'
      || needs.detect-changes.outputs.frontend == 'true')
      && needs.build-plugins.result == 'success'
      && needs.build-server.result == 'success'
      && contains(fromJSON('["success","skipped"]'), needs.build-marketplace.result)
      && contains(fromJSON('["success","skipped"]'), needs.build-frontend.result)
    uses: ./.github/workflows/cypress-platform.yml
    with:
      edition: 'ee'
    secrets: inherit

  cypress-marketplace:
    name: 'Test Suite · cypress-marketplace'
    needs:
      - detect-changes
      - build-plugins
      - build-server
      - build-frontend
      - build-marketplace
    if: >-
      !cancelled()
      && needs.detect-changes.outputs.mode == 'full'
      && needs.detect-changes.outputs.marketplace == 'true'
      && needs.build-plugins.result == 'success'
      && needs.build-server.result == 'success'
      && needs.build-marketplace.result == 'success'
      && contains(fromJSON('["success","skipped"]'), needs.build-frontend.result)
    uses: ./.github/workflows/cypress-marketplace.yml
    with:
      edition: 'ee'
    secrets: inherit

  # ---------------------------------------------------------------------------
  # 5. Gate — aggregates results, posts PR comment, removes label
  # ---------------------------------------------------------------------------
  ci-gate:
    name: 'Gate'
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      pull-requests: write
      statuses: write
      actions: read   # jobs API — step links in the PR comment
    needs:
      - detect-changes
      - build-server
      - build-frontend
      - build-plugins
      - build-marketplace
      - test-changed
      - test-server-unit
      - test-server-e2e
      - cypress-platform
      - cypress-marketplace
    steps:
      - name: Evaluate results
        id: eval
        run: |
          # Merge enforcement lives in the 'CI Gate' COMMIT STATUS (posted below,
          # full mode only) — not in this job's conclusion. An unposted status
          # blocks protected branches; fast runs and unrelated labels stay silent
          # and never mint a mergeable state.
          MODE="${{ needs.detect-changes.outputs.mode }}"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

          if [[ "${{ needs.detect-changes.result }}" == "skipped" ]]; then
            echo "Unrelated label event — nothing ran, nothing to report."
            echo "verdict=noop" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ needs.detect-changes.result }}" == "failure" ]]; then
            echo "::error::detect-changes failed — CI infrastructure broken"
            echo "verdict=fail" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          failed=false
          builds=(
            "build-server:${{ needs.build-server.result }}"
            "build-frontend:${{ needs.build-frontend.result }}"
            "build-plugins:${{ needs.build-plugins.result }}"
            "build-marketplace:${{ needs.build-marketplace.result }}"
          )
          if [[ "$MODE" == "changed" ]]; then
            results=("${builds[@]}" "test-changed:${{ needs.test-changed.result }}")
          else
            results=(
              "${builds[@]}"
              "test-server-unit:${{ needs.test-server-unit.result }}"
              "test-server-e2e:${{ needs.test-server-e2e.result }}"
              "cypress-platform:${{ needs.cypress-platform.result }}"
              "cypress-marketplace:${{ needs.cypress-marketplace.result }}"
            )
          fi

          for entry in "${results[@]}"; do
            job="${entry%%:*}"
            result="${entry##*:}"
            echo "$job: $result"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              failed=true
            fi
          done

          if [[ "$failed" == "true" ]]; then
            echo "verdict=fail" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=pass" >> "$GITHUB_OUTPUT"
          fi

      # Comment pipeline — one path for both lanes: download jest JSONs,
      # render markdown via scripts/render-ci-comment.sh, upsert by marker.
      - uses: actions/checkout@v4
        if: >-
          github.event_name == 'pull_request'
          && contains(fromJSON('["pass","fail"]'), steps.eval.outputs.verdict)

      - name: Download changed-run test results
        if: >-
          github.event_name == 'pull_request'
          && steps.eval.outputs.mode == 'changed'
          && contains(fromJSON('["pass","fail"]'), steps.eval.outputs.verdict)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: fast-test-results
          path: /tmp/ci-results

      - name: Download full-run unit results
        if: >-
          github.event_name == 'pull_request'
          && steps.eval.outputs.mode == 'full'
          && contains(fromJSON('["pass","fail"]'), steps.eval.outputs.verdict)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: full-unit-results
          path: /tmp/ci-results

      - name: Download full-run e2e results
        if: >-
          github.event_name == 'pull_request'
          && steps.eval.outputs.mode == 'full'
          && contains(fromJSON('["pass","fail"]'), steps.eval.outputs.verdict)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: full-e2e-results
          path: /tmp/ci-results/tj-e2e-json

      - name: Download build logs
        if: >-
          github.event_name == 'pull_request'
          && contains(fromJSON('["pass","fail"]'), steps.eval.outputs.verdict)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: buildlog-*
          merge-multiple: true
          path: /tmp/ci-results/buildlogs

      - name: Render PR comment
        if: >-
          github.event_name == 'pull_request'
          && contains(fromJSON('["pass","fail"]'), steps.eval.outputs.verdict)
        env:
          GH_TOKEN: ${{ github.token }}
          BUILDLOG_DIR: /tmp/ci-results/buildlogs
          MODE: ${{ steps.eval.outputs.mode }}
          VERDICT: ${{ steps.eval.outputs.verdict }}
          SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BASE_REF: ${{ github.base_ref }}
          UNIT_JSON: /tmp/ci-results/tj-unit-results.json
          E2E_JSON_DIR: /tmp/ci-results/tj-e2e-json
          RESULT_BUILD_SERVER: ${{ needs.build-server.result }}
          RESULT_BUILD_PLUGINS: ${{ needs.build-plugins.result }}
          RESULT_BUILD_FRONTEND: ${{ needs.build-frontend.result }}
          RESULT_BUILD_MARKETPLACE: ${{ needs.build-marketplace.result }}
          RESULT_UNIT: ${{ needs.test-server-unit.result }}
          RESULT_E2E: ${{ needs.test-server-e2e.result }}
          RESULT_CHANGED: ${{ needs.test-changed.result }}
          RESULT_CYPRESS_PLATFORM: ${{ needs.cypress-platform.result }}
          RESULT_CYPRESS_MARKETPLACE: ${{ needs.cypress-marketplace.result }}
        run: |
          jobs_json=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs?per_page=100" 2>/dev/null || echo '{}')
          job_url() { echo "$jobs_json" | jq -r --arg n "$1" '.jobs[]? | select(.name | contains($n)) | .html_url' | head -1; }
          if [ "$MODE" = "changed" ]; then
            export UNIT_STEP_URL=$(job_url "Changed OK")
            export E2E_STEP_URL="$UNIT_STEP_URL"
            export SCOPE=$(cat /tmp/ci-results/tj-scope.txt 2>/dev/null || echo "not recorded")
          else
            export UNIT_STEP_URL=$(job_url "server-unit")
            export E2E_STEP_URL=$(job_url "server-e2e")
          fi
          bash scripts/render-ci-comment.sh "$MODE" > /tmp/ci-comment.md
          cat /tmp/ci-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: >-
          github.event_name == 'pull_request'
          && contains(fromJSON('["pass","fail"]'), steps.eval.outputs.verdict)
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request?.number || context.issue?.number;
            if (!prNumber) return;
            const body = fs.readFileSync('/tmp/ci-comment.md', 'utf8');
            const marker = body.split('\n')[0];   // ci-gate-comment or ci-fast-comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: prNumber, body,
              });
            }

      - name: Post CI Gate commit status
        # merge enforcement: only full runs ever touch this status; branch
        # protection on develop/main/release/* requires context 'CI Gate'
        if: >-
          steps.eval.outputs.mode == 'full'
          && contains(fromJSON('["pass","fail"]'), steps.eval.outputs.verdict)
        uses: actions/github-script@v7
        with:
          script: |
            const verdict = '${{ steps.eval.outputs.verdict }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request?.head?.sha || context.sha,
              state: verdict === 'pass' ? 'success' : 'failure',
              context: 'CI Gate',
              description: verdict === 'pass' ? 'Full CI green' : 'Full CI failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Remove triggering label
        if: >-
          github.event_name == 'pull_request'
          && contains(fromJSON('["run-ci", "run-ci-changed"]'), github.event.label.name)
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number || context.issue?.number;
            if (!prNumber) return;
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: context.payload.label.name,
              });
            } catch (e) {
              if (e.status !== 404) throw e;
            }

      - name: Fail gate if checks failed
        if: steps.eval.outputs.verdict == 'fail'
        run: |
          echo "::error::One or more CI jobs failed"
          exit 1
