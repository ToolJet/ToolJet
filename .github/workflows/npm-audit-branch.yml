name: Weekly Vulnerability Report

on:
  pull_request:
    branches: [main]
    
  schedule:
    # 03:30 UTC = 09:00 IST, every Monday
    - cron: '30 3 * * 1'
  workflow_dispatch:   # manual "Run workflow" button (default branch only)

permissions:
  contents: read

jobs:
  vulnerability-report:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false       # one branch failing must not skip the other
      matrix:
        # Add/replace branches here. Bump lts-3.16 when the LTS line moves.
        branch: [main, lts-3.16]
    steps:
      - name: Checkout ${{ matrix.branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run npm audit across the whole branch
        id: scan
        env:
          # Excludes any lockfile under a docs/ path (mirrors the Dependabot
          # dismissals). Set to "" if you ever want to audit docs too.
          EXCLUDE_PATTERN: "/docs/"
        run: |
          set -uo pipefail

          c=0 h=0 m=0 l=0 found=0

          # Find every lockfile in the branch, skipping node_modules
          while IFS= read -r lockfile; do
            dir=$(dirname "$lockfile")

            # Optional exclude (e.g. docs/)
            if [ -n "$EXCLUDE_PATTERN" ] && echo "$lockfile" | grep -q "$EXCLUDE_PATTERN"; then
              echo "Skipping $lockfile (matched EXCLUDE_PATTERN)"
              continue
            fi

            found=$((found + 1))
            audit=$(cd "$dir" && npm audit --json 2>/dev/null || true)
            c=$(( c + $(echo "$audit" | jq -r '.metadata.vulnerabilities.critical // 0') ))
            h=$(( h + $(echo "$audit" | jq -r '.metadata.vulnerabilities.high // 0') ))
            m=$(( m + $(echo "$audit" | jq -r '.metadata.vulnerabilities.moderate // 0') ))
            l=$(( l + $(echo "$audit" | jq -r '.metadata.vulnerabilities.low // 0') ))
          done < <(find . -name package-lock.json -not -path '*/node_modules/*')

          echo "Audited $found lockfile(s) on ${{ matrix.branch }}"

          # Color from the worst severity on this branch
          if   [ "$c" -gt 0 ]; then color="#D40E0D"   # red
          elif [ "$h" -gt 0 ]; then color="#E8912D"   # orange
          else                      color="#2EB67D"   # green
          fi

          {
            echo "critical=$c"
            echo "high=$h"
            echo "medium=$m"
            echo "low=$l"
            echo "total=$(( c + h + m + l ))"
            echo "lockfiles=$found"
            echo "color=$color"
          } >> "$GITHUB_OUTPUT"

      # ---- Output for testing (independent of Slack) -------------------------
      - name: Write report file
        run: |
          mkdir -p reports
          SCAN_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")

          # Human-readable text
          cat > "reports/vuln-report-${{ matrix.branch }}.txt" <<EOF
          Weekly Vulnerability Report
          ===========================
          Repository : ${{ github.repository }}
          Branch     : ${{ matrix.branch }}
          Scan time  : $SCAN_TIME
          Lockfiles  : ${{ steps.scan.outputs.lockfiles }} (docs/ excluded)

          Critical : ${{ steps.scan.outputs.critical }}
          High     : ${{ steps.scan.outputs.high }}
          Medium   : ${{ steps.scan.outputs.medium }}
          Low      : ${{ steps.scan.outputs.low }}
          ---------------------------
          Total    : ${{ steps.scan.outputs.total }}
          EOF

          echo "----- Report -----"
          cat "reports/vuln-report-${{ matrix.branch }}.txt"

      - name: Add to run summary
        run: |
          {
            echo "## 🔒 Vulnerability Report — \`${{ matrix.branch }}\`"
            echo ""
            echo "| Severity | Count |"
            echo "|----------|-------|"
            echo "| 🔴 Critical | ${{ steps.scan.outputs.critical }} |"
            echo "| 🟠 High | ${{ steps.scan.outputs.high }} |"
            echo "| 🟡 Medium | ${{ steps.scan.outputs.medium }} |"
            echo "| ⚪ Low | ${{ steps.scan.outputs.low }} |"
            echo "| 📊 **Total** | **${{ steps.scan.outputs.total }}** |"
            echo ""
            echo "_Lockfiles scanned: ${{ steps.scan.outputs.lockfiles }} · docs/ excluded_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: vuln-report-${{ matrix.branch }}
          path: reports/
